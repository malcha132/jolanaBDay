<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jolana Fishing Pro - Deluxe</title>
    <style>
        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000c1f; touch-action: none; font-family: 'Courier New', monospace; }
        canvas { display: block; width: 100vw; height: 100vh; }
        #ui {
            position: absolute; top: 18px; width: 100%; text-align: center;
            color: #00ffcc; font-size: 20px; font-weight: bold; z-index: 50;
            pointer-events: none; letter-spacing: 3px; text-shadow: 0 0 8px #00ffcc;
        }
        #msg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: rgba(0,12,31,0.9); color: white; z-index: 100;
        }
        h1 { font-size: 42px; color: #ff00aa; text-shadow: 0 0 20px #ff00aa; margin-bottom: 10px; text-align: center; }
        .sub { color: #00ffcc; letter-spacing: 4px; margin-bottom: 30px; }
        button { padding: 15px 40px; font-size: 20px; background: none; color: #ff00aa; border: 2px solid #ff00aa; cursor: pointer; font-family: inherit; font-weight: bold; }
    </style>
</head>
<body>
<div id="ui">SKÓRE: <span id="money">0</span> | HLOUBKA: <span id="depth">0</span>m</div>
<div id="msg">
    <h1>◈ JOLANA ◈</h1>
    <p class="sub">FISHING PRO</p>
    <button id="startBtn">START LOVU</button>
</div>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const startBtn = document.getElementById('startBtn');
const msgEl = document.getElementById('msg');
const moneyEl = document.getElementById('money');
const depthEl = document.getElementById('depth');

let width, height, money = 0, gameState = 'START';
let hook = { x: 0, y: 50 };
let fishes = [], caughtFishes = [], flashes = [], trail = [];
let shake = 0, time = 0;

function resize() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

function spawn() {
    fishes = []; caughtFishes = []; 
    for (let i = 0; i < 45; i++) {
        fishes.push({
            x: Math.random() * width,
            y: 600 + i * 180,
            color: `hsl(${Math.random() * 360}, 80%, 60%)`,
            size: 18 + Math.random() * 10,
            speed: (Math.random() - 0.5) * 6,
            caught: false
        });
    }
}

function drawFish(f, isLeftHalf = null) {
    ctx.save();
    ctx.translate(f.x, f.y);
    if (f.vx < 0 || f.speed < 0) ctx.scale(-1, 1);
    
    // Pokud je ryba "rozseknutá", vykreslíme jen půlku
    if (isLeftHalf === true) ctx.clip(new Path2D("M -50,-50 L 0,-50 L 0,50 L -50,50 Z"));
    if (isLeftHalf === false) ctx.clip(new Path2D("M 0,-50 L 50,-50 L 50,50 L 0,50 Z"));

    ctx.fillStyle = f.color;
    ctx.shadowBlur = 15; ctx.shadowColor = f.color;
    ctx.beginPath();
    ctx.ellipse(0, 0, f.size, f.size * 0.6, 0, 0, Math.PI * 2);
    ctx.fill();
    
    // Oko
    ctx.fillStyle = "white";
    ctx.beginPath(); ctx.arc(f.size * 0.4, -f.size * 0.1, 3, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
}

function move(e) {
    const rect = canvas.getBoundingClientRect();
    const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
    const y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
    
    // Stopa mačety
    if (gameState === 'FLY') {
        trail.push({ x, y, age: 0 });
        
        caughtFishes.forEach(f => {
            if (!f.sliced && Math.hypot(x - f.x, y - f.y) < 50) {
                f.sliced = true;
                money += 25;
                moneyEl.innerText = money;
                shake = 10; // Zatřesení obrazovkou
                
                // Vytvoření dvou polovin ryby
                f.halves = [
                    { x: f.x, y: f.y, vx: -5, vy: f.vy, color: f.color, size: f.size, rot: -0.2 },
                    { x: f.x, y: f.y, vx: 5, vy: f.vy, color: f.color, size: f.size, rot: 0.2 }
                ];
            }
        });
    }
    hook.targetX = x;
}

window.addEventListener('mousemove', move);
window.addEventListener('touchmove', move);
window.addEventListener('mousedown', () => isDrawing = true);

startBtn.onclick = () => {
    msgEl.style.display = 'none';
    money = 0; moneyEl.innerText = '0';
    hook.y = 50; hook.x = width/2; hook.targetX = width/2;
    spawn();
    gameState = 'DOWN';
    requestAnimationFrame(loop);
};

function loop() {
    if (gameState === 'START') return;
    
    // Shake efekt
    let sx = (Math.random() - 0.5) * shake;
    let sy = (Math.random() - 0.5) * shake;
    if (shake > 0) shake *= 0.9;

    ctx.setTransform(1, 0, 0, 1, sx, sy);
    
    // Pozadí
    ctx.fillStyle = '#000c1f';
    ctx.fillRect(0, 0, width, height);

    if (gameState === 'DOWN' || gameState === 'UP') {
        hook.x += (hook.targetX - hook.x) * 0.15;
        if (gameState === 'DOWN') {
            hook.y += 8;
            depthEl.innerText = Math.floor(hook.y / 10);
            fishes.forEach(f => { if (Math.hypot(hook.x - f.x, hook.y - f.y) < 30) gameState = 'UP'; });
            if (hook.y > 8000) gameState = 'UP';
        } else {
            hook.y -= 10;
            fishes.forEach(f => {
                if (!f.caught && Math.hypot(hook.x - f.x, hook.y - f.y) < 45) {
                    f.caught = true; caughtFishes.push(f);
                    money += 5; moneyEl.innerText = money;
                }
            });
            if (hook.y < 50) {
                gameState = 'FLY';
                caughtFishes.forEach(f => {
                    f.x = width/2; f.y = height - 50;
                    f.vx = (Math.random() - 0.5) * 12;
                    f.vy = -Math.random() * 15 - 10;
                    f.sliced = false;
                });
            }
        }

        ctx.save();
        ctx.translate(0, -hook.y + height / 2);
        // Čára udice
        ctx.strokeStyle = "rgba(255,255,255,0.3)";
        ctx.beginPath(); ctx.moveTo(width/2 + 40, -100); ctx.lineTo(hook.x, hook.y); ctx.stroke();
        
        fishes.forEach(f => {
            if (!f.caught) {
                f.x += f.speed;
                if (f.x > width + 50) f.x = -50; else if (f.x < -50) f.x = width + 50;
                drawFish(f);
            }
        });
        // Háček
        ctx.strokeStyle = "white"; ctx.lineWidth = 3;
        ctx.beginPath(); ctx.arc(hook.x-5, hook.y, 5, 0, Math.PI); ctx.stroke();
        ctx.restore();
    }

    if (gameState === 'FLY') {
        let active = 0;
        caughtFishes.forEach(f => {
            if (!f.sliced) {
                f.x += f.vx * 0.5; f.y += f.vy * 0.5; f.vy += 0.2; // Slow-mo gravitace
                drawFish(f);
                active++;
            } else {
                // Vykreslení půlek
                f.halves.forEach((h, i) => {
                    h.x += h.vx; h.y += h.vy; h.vy += 0.5;
