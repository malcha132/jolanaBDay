<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jolana Arcade Fishing</title>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background: #000a1a; 
            touch-action: none; user-select: none; -webkit-user-select: none;
            font-family: 'Courier New', Courier, monospace;
        }
        canvas { display: block; width: 100vw; height: 100vh; background: #0044cc; }
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; background: #000a1a;
            color: white; z-index: 100;
        }
        button {
            padding: 20px 50px; font-size: 28px; font-weight: bold;
            background: #28a745; border: 4px solid white; border-radius: 10px;
            color: white; cursor: pointer; text-transform: uppercase;
        }
        #ui {
            position: absolute; top: 15px; width: 100%;
            text-align: center; color: white;
            font-size: 22px; pointer-events: none; z-index: 50; text-shadow: 2px 2px #000;
        }
    </style>
</head>
<body>

<div id="ui">SCORE: <span id="money">0</span> | DEPTH: <span id="depth">0</span>m</div>

<div id="overlay">
    <h1 style="margin-bottom: 5px; font-size: 40px; color: #ffff00;">JOLANA FISH</h1>
    <p style="margin-bottom: 30px; color: #ffffff;">ARKÁDOVÝ LOV</p>
    <button id="startBtn">START</button>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const startBtn = document.getElementById('startBtn');
const overlay = document.getElementById('overlay');
const moneyEl = document.getElementById('money');
const depthEl = document.getElementById('depth');

let width, height, money = 0, gameState = 'START';
let hook = { x: 0, y: 50, speed: 4, radius: 10 }; 
let fishes = [], caughtFishes = [], targetX = 0;
let animationStarted = false;

// Arkádová paleta (bez růžové)
const arcadeColors = ['#ff0000', '#ffff00', '#00ff00', '#00ffff', '#ffffff'];

function resize() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
    hook.x = width / 2;
    targetX = width / 2;
}

window.addEventListener('resize', resize);
resize();

function drawFish(x, y, size, color, isFlipped) {
    ctx.fillStyle = color;
    // Tělo
    ctx.fillRect(x - size/2, y - size/4, size, size/2);
    // Ocas
    let t = isFlipped ? size/2 : -size/2;
    ctx.beginPath();
    ctx.moveTo(x + t, y);
    ctx.lineTo(x + t*2, y - size/2);
    ctx.lineTo(x + t*2, y + size/2);
    ctx.fill();
    // Oko
    ctx.fillStyle = "black";
    ctx.fillRect(x - t/1.2, y - 2, 3, 3);
}

startBtn.addEventListener('click', (e) => {
    e.preventDefault();
    overlay.style.display = 'none';
    gameState = 'DOWN';
    money = 0;
    moneyEl.innerText = money;
