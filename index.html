<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jolana Fishing Pro</title>
    <style>
        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000c1f; touch-action: none; font-family: 'Courier New', monospace; }
        canvas { display: block; width: 100vw; height: 100vh; }
        #ui {
            position: absolute; top: 18px; width: 100%; text-align: center;
            color: #00ffcc; font-size: 20px; font-weight: bold; z-index: 50;
            pointer-events: none; letter-spacing: 3px;
            text-shadow: 0 0 8px #00ffcc;
        }
        #msg {
            position: absolute; inset: 0; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; background: #000c1f; color: white; z-index: 100;
        }
        h1 { font-size: 42px; color: #ff00aa; text-shadow: 0 0 10px #ff00aa; margin: 0; }
        .sub { color: #00ffcc; letter-spacing: 4px; margin-bottom: 30px; }
        button { padding: 18px 55px; font-size: 22px; background: transparent; color: #ff00aa; border: 2px solid #ff00aa; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
<div id="ui">SKÓRE: <span id="money">0</span> &nbsp;|&nbsp; HLOUBKA: <span id="depth">0</span>m</div>
<div id="msg">
    <h1>◈ JOLANA ◈</h1>
    <p class="sub">FISHING PRO</p>
    <button id="startBtn">START</button>
</div>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const startBtn = document.getElementById('startBtn');
const msgEl = document.getElementById('msg');
const moneyEl = document.getElementById('money');
const depthEl = document.getElementById('depth');

let width, height, money = 0, gameState = 'START';
let hook = { x: 0, y: 50, speed: 8 };
let fishes = [], caughtFishes = [], trail = [];
let targetX = 0;

function resize() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
    hook.x = width / 2;
}
window.addEventListener('resize', resize);
resize();

function spawn() {
    fishes = []; caughtFishes = [];
    for (let i = 0; i < 40; i++) {
        fishes.push({
            x: Math.random() * width,
            y: 600 + i * 200,
            color: `hsl(${Math.random() * 360}, 80%, 60%)`,
            size: 20 + Math.random() * 10,
            speed: (Math.random() - 0.5) * 6,
            vx: 0, vy: 0, // Důležité pro fázi FLY
            caught: false,
            sliced: false,
            sliceGap: 0
        });
    }
}

function drawFish(f) {
    ctx.save();
    ctx.translate(f.x, f.y);
    // Otočení ryby podle směru pohybu
    let dir = (gameState === 'FLY') ? f.vx : f.speed;
    if (dir < 0) ctx.scale(-1, 1);
    
    ctx.fillStyle = f.color;
    ctx.shadowBlur = f.sliced ? 0 : 15;
    ctx.shadowColor = f.color;

    if (f.sliced) {
        // Vykreslení dvou půlek při rozseknutí
        ctx.fillRect(-f.size, -f.sliceGap - 2, f.size * 1.5, f.size * 0.4);
        ctx.fillRect(-f.size, f.sliceGap + 2, f.size * 1.5, f.size * 0.4);
    } else {
        // Celá ryba
        ctx.beginPath();
        ctx.ellipse(0, 0, f.size, f.size * 0.6, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo(-f.size * 0.8, 0);
        ctx.lineTo(-f.size * 1.4, -f.size * 0.5);
        ctx.lineTo(-f.size * 1.4, f.size * 0.5);
        ctx.fill();
    }
    ctx.restore();
}

function move(e) {
    const x = e.touches ? e.touches[0].clientX : e.clientX;
    const y = e.touches ? e.touches[0].clientY : e.clientY;
    targetX = x;

    if (gameState === 'FLY') {
        trail.push({ x, y, age: 0 });
        caughtFishes.forEach(f => {
            // Detekce zásahu mačetou
            if (!f.sliced && Math.hypot(x - f.x, y - f.y) < 50) {
                f.sliced = true;
                f.vy = 4; // Ryba po seknutí spadne
                money += 25;
                moneyEl.innerText = money;
            }
        });
    }
}

window.addEventListener('mousemove', move);
window.addEventListener('touchmove', move);

startBtn.onclick = () => {
    msgEl.style.display = 'none';
    money = 0; moneyEl.innerText = '0';
    hook.y = 50; gameState = 'DOWN';
    spawn();
    requestAnimationFrame(loop);
};

function loop() {
    if (gameState === 'START') return;

    ctx.fillStyle = '#000c1f';
    ctx.fillRect(0, 0, width, height);

    if (gameState === 'DOWN' || gameState === 'UP') {
        hook.x += (targetX - hook.x) * 0.15;
        
        if (gameState === 'DOWN') {
            hook.y += 8;
            depthEl.innerText = Math.floor(hook.y / 10);
            fishes.forEach(f =>
