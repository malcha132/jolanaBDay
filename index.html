<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jolana Fishing Pro</title>
    <style>
        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000c1f; touch-action: none; font-family: 'Courier New', monospace; }
        canvas { display: block; width: 100vw; height: 100vh; }
        #ui {
            position: absolute; top: 18px; width: 100%; text-align: center;
            color: #00ffcc; font-size: 20px; font-weight: bold; z-index: 50;
            pointer-events: none; letter-spacing: 3px;
            text-shadow: 0 0 8px #00ffcc, 0 0 20px #00ffcc88;
        }
        #msg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: #000c1f; color: white; z-index: 100;
        }
        h1 { font-family: 'Courier New', monospace; font-size: 42px; letter-spacing: 6px; color: #ff00aa; margin-bottom: 8px; text-shadow: 0 0 10px #ff00aa, 0 0 30px #ff00aa88; }
        .sub { color: #00ffcc; letter-spacing: 4px; font-size: 14px; margin-bottom: 40px; text-shadow: 0 0 8px #00ffcc; }
        button { padding: 18px 55px; font-size: 22px; font-family: 'Courier New', monospace; background: transparent; color: #ff00aa; letter-spacing: 4px; border: 2px solid #ff00aa; border-radius: 4px; font-weight: bold; cursor: pointer; text-shadow: 0 0 8px #ff00aa; box-shadow: 0 0 12px #ff00aa88, inset 0 0 12px #ff00aa22; transition: all 0.15s; }
        button:hover { background: #ff00aa22; box-shadow: 0 0 24px #ff00aacc, inset 0 0 20px #ff00aa44; }
    </style>
</head>
<body>
<div id="ui">SKÓRE: <span id="money">0</span> &nbsp;|&nbsp; HLOUBKA: <span id="depth">0</span>m</div>
<div id="msg">
    <h1>◈ JOLANA ◈</h1>
    <p class="sub">FISHING PRO</p>
    <p style="color:#444; font-size:13px; letter-spacing:2px; margin-bottom:36px;">CHYTEJ RYBY CESTOU NAHORU</p>
    <button id="startBtn">&#9654; START</button>
</div>
<canvas id="game"></canvas>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const startBtn = document.getElementById('startBtn');
const msgEl = document.getElementById('msg');
const moneyEl = document.getElementById('money');
const depthEl = document.getElementById('depth');

let width, height, money = 0, gameState = 'START';
let hook = { x: 0, y: 50, speed: 6 };
let fishes = [], caughtFishes = [], targetX = 0, time = 0;
let bubbles = [], seaweeds = [], corals = [], flashes = [];

const fishColors = ['#ff00aa', '#00ffcc', '#ffee00', '#ff6600', '#cc00ff', '#00aaff', '#ff3355', '#44ff88'];
const ROD_TIP_OFFSET_X = 38; // relative to width/2
const ROD_TIP_Y = -118;      // world y

function resize() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
    hook.x = width / 2;
    targetX = width / 2;
}
window.addEventListener('resize', resize);
resize();

// ─── INIT ────────────────────────────────────────────────────────────────────

function initBubbles() {
    bubbles = [];
    for (let i = 0; i < 70; i++) {
        bubbles.push({
            x: Math.random() * width,
            y: 80 + Math.random() * 8600,
            r: 0.8 + Math.random() * 2.8,
            speed: 0.35 + Math.random() * 0.65,
            phase: Math.random() * Math.PI * 2
        });
    }
}

function initSeaweeds() {
    seaweeds = [];
    const xs = [0.05,0.13,0.24,0.34,0.47,0.58,0.68,0.78,0.87,0.94];
    xs.forEach(xr => {
        seaweeds.push({
            x: xr * width + (Math.random()-0.5)*30,
            h: 100 + Math.random() * 200,
            phase: Math.random() * Math.PI * 2,
            segs: 7 + Math.floor(Math.random() * 5),
            g: 90 + Math.floor(Math.random() * 80),
            lw: 2 + Math.random() * 2.5
        });
    });
}

function initCorals() {
    corals = [];
    for (let i = 0; i < 14; i++) {
        corals.push({
            x: Math.random() * width,
            y: 9360 + Math.random() * 80,
            r: 18 + Math.random() * 38,
            color: ['#3a1a2a','#1a2a1a','#0a1a33','#2a0a33','#1a2a2a'][i % 5]
        });
    }
}

function spawn() {
    fishes = []; caughtFishes = []; flashes = [];
    initBubbles(); initSeaweeds(); initCorals();
    for (let i = 0; i < 50; i++) {
        fishes.push({
            x: Math.random() * width,
            y: 600 + i * 170,
            color: fishColors[i % fishColors.length],
            size: 16 + Math.random() * 10,
            speed: (Math.random() - 0.5) * 7,
            caught: false,
            wobble: Math.random() * Math.PI * 2
        });
    }
}

// ─── DRAW FISH ────────────────────────────────────────────────────────────────

function drawFish(x, y, size, color, flip) {
    ctx.save();
    ctx.translate(x, y);
    if (flip) ctx.scale(-1, 1);

    ctx.shadowBlur = 18;
    ctx.shadowColor = color;

    // Body
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.moveTo(size * 0.82, 0);
    ctx.bezierCurveTo(size * 0.6, -size * 0.48, -size * 0.45, -size * 0.52, -size * 0.8, 0);
    ctx.bezierCurveTo(-size * 0.45, size * 0.42, size * 0.6, size * 0.42, size * 0.82, 0);
    ctx.fill();

    // Belly highlight
    ctx.shadowBlur = 0;
    ctx.fillStyle = 'rgba(255,255,255,0.18)';
    ctx.beginPath();
    ctx.moveTo(size * 0.45, size * 0.08);
    ctx.bezierCurveTo(size * 0.15, size * 0.34, -size * 0.3, size * 0.36, -size * 0.55, size * 0.18);
    ctx.bezierCurveTo(-size * 0.3, size * 0.42, size * 0.15, size * 0.4, size * 0.45, size * 0.08);
    ctx.fill();

    // Tail top lobe
    ctx.shadowBlur = 10;
    ctx.shadowColor = color;
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.moveTo(-size * 0.72, 0);
    ctx.bezierCurveTo(-size * 1.0, -size * 0.12, -size * 1.45, -size * 0.58, -size * 1.35, -size * 0.68);
    ctx.bezierCurveTo(-size * 1.15, -size * 0.46, -size * 0.92, -size * 0.22, -size * 0.72, 0);
    ctx.fill();
    // Tail bottom lobe
    ctx.beginPath();
    ctx.moveTo(-size * 0.72, 0);
    ctx.bezierCurveTo(-size * 1.0, size * 0.12, -size * 1.45, size * 0.58, -size * 1.35, size * 0.68);
    ctx.bezierCurveTo(-size * 1.15, size * 0.46, -size * 0.92, size * 0.22, -size * 0.72, 0);
    ctx.fill();

    // Dorsal fin
    ctx.beginPath();
    ctx.moveTo(-size * 0.05, -size * 0.46);
    ctx.bezierCurveTo(size * 0.15, -size * 0.9, size * 0.5, -size * 0.82, size * 0.52, -size * 0.46);
    ctx.closePath();
    ctx.fill();

    // Pectoral fin (semi-transparent)
    ctx.fillStyle = color + '77';
    ctx.beginPath();
    ctx.moveTo(size * 0.15, size * 0.12);
    ctx.bezierCurveTo(size * 0.25, size * 0.52, -size * 0.08, size * 0.56, -size * 0.22, size * 0.22);
    ctx.closePath();
    ctx.fill();

    // Eye white
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(size * 0.5, -size * 0.08, size * 0.18, 0, Math.PI * 2);
    ctx.fill();
    // Pupil
    ctx.fillStyle = '#111';
    ctx.beginPath();
    ctx.arc(size * 0.52, -size * 0.08, size * 0.11, 0, Math.PI * 2);
    ctx.fill();
    // Highlight
    ctx.fillStyle = 'rgba(255,255,255,0.9)';
    ctx.beginPath();
    ctx.arc(size * 0.56, -size * 0.13, size * 0.045, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
    ctx.shadowBlur = 0;
    ctx.shadowColor = 'transparent';
}

// ─── DRAW HOOK ────────────────────────────────────────────────────────────────

function drawHook(x, y) {
    ctx.shadowBlur = 10;
    ctx.shadowColor = '#88ccff';
    ctx.strokeStyle = '#c8dff0';
    ctx.lineWidth = 2.5;
    ctx.lineCap = 'round';
    // Shank
    ctx.beginPath();
    ctx.moveTo(x, y - 12);
    ctx.lineTo(x, y + 6);
    // Bend + point
    ctx.arc(x - 7, y + 6, 7, 0, Math.PI * 0.75);
    ctx.stroke();
    // Barb
    ctx.beginPath();
    ctx.moveTo(x - 13, y + 8);
    ctx.lineTo(x - 9, y + 2);
    ctx.stroke();
    // Bait (little worm)
    ctx.shadowColor = '#ff5522';
    ctx.shadowBlur = 8;
    ctx.strokeStyle = '#ff3300';
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.moveTo(x - 5, y + 12);
    ctx.bezierCurveTo(x + 5, y + 15, x + 7, y + 22, x + 1, y + 26);
    ctx.stroke();
    ctx.shadowBlur = 0;
}

// ─── DRAW BOAT ────────────────────────────────────────────────────────────────

function drawBoat() {
    const bx = width / 2;
    const by = -80;

    // Hull shadow
    ctx.fillStyle = '#2a1505';
    ctx.beginPath();
    ctx.moveTo(bx - 52, by + 12);
    ctx.lineTo(bx + 52, by + 12);
    ctx.lineTo(bx + 40, by + 32);
    ctx.lineTo(bx - 40, by + 32);
    ctx.closePath();
    ctx.fill();

    // Hull
    ctx.fillStyle = '#7B3F10';
    ctx.beginPath();
    ctx.moveTo(bx - 50, by + 10);
    ctx.lineTo(bx + 50, by + 10);
    ctx.lineTo(bx + 38, by + 30);
    ctx.lineTo(bx - 38, by + 30);
    ctx.closePath();
    ctx.fill();

    // Hull rim
    ctx.strokeStyle = '#A0522D';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(bx - 50, by + 10);
    ctx.lineTo(bx + 50, by + 10);
    ctx.stroke();

    // Cabin
    ctx.fillStyle = '#9C6B3A';
    ctx.fillRect(bx - 15, by - 12, 32, 24);
    ctx.strokeStyle = '#7B4F25';
    ctx.lineWidth = 1.5;
    ctx.strokeRect(bx - 15, by - 12, 32, 24);

    // Fishing rod
    ctx.shadowBlur = 4;
    ctx.shadowColor = '#553311';
    ctx.strokeStyle = '#6B4226';
    ctx.lineWidth = 4;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(bx - 28, by + 8);
    ctx.lineTo(bx + ROD_TIP_OFFSET_X, ROD_TIP_Y + by + 80); // rod tip
    ctx.stroke();
    ctx.shadowBlur = 0;
}

// ─── DRAW WAVY LINE ───────────────────────────────────────────────────────────

function drawWavyLine(x1, y1, x2, y2) {
    const segs = 32;
    const dx = x2 - x1, dy = y2 - y1;
    const len = Math.hypot(dx, dy);
    if (len < 1) return;
    const nx = -dy / len, ny = dx / len;
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    for (let i = 1; i <= segs; i++) {
        const t = i / segs;
        const px = x1 + dx * t, py = y1 + dy * t;
        const amp = Math.sin(t * Math.PI) * 9;
        const wave = Math.sin(t * Math.PI * 5 - time * 0.12) * amp;
        ctx.lineTo(px + nx * wave, py + ny * wave);
    }
    ctx.stroke();
}

// ─── DRAW WATER SURFACE ───────────────────────────────────────────────────────

function drawSurface() {
    ctx.shadowBlur = 10;
    ctx.shadowColor = '#3399ff';
    ctx.strokeStyle = 'rgba(80, 180, 255, 0.65)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    for (let x = 0; x <= width; x += 6) {
        const y = Math.sin(x * 0.018 + time * 0.04) * 5 + Math.sin(x * 0.045 + time * 0.025) * 3;
        x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.stroke();
    // Shimmer layer just below
    ctx.shadowBlur = 0;
    ctx.fillStyle = 'rgba(50, 130, 220, 0.12)';
    ctx.fillRect(0, 2, width, 28);
}

// ─── DRAW LIGHT RAYS ─────────────────────────────────────────────────────────

function drawLightRays() {
    const numRays = 8;
    for (let i = 0; i < numRays; i++) {
        const baseX = (width / numRays) * i + width / (numRays * 2);
        const spread = 35 + Math.sin(time * 0.008 + i * 1.1) * 18;
        const opacity = 0.018 + Math.abs(Math.sin(time * 0.012 + i * 0.9)) * 0.025;
        ctx.beginPath();
        ctx.moveTo(baseX, -180);
        ctx.lineTo(baseX - spread, 2200);
        ctx.lineTo(baseX + spread, 2200);
        ctx.closePath();
        ctx.fillStyle = `rgba(100, 190, 255, ${opacity})`;
        ctx.fill();
    }
}

// ─── DRAW BUBBLES ─────────────────────────────────────────────────────────────

function updateBubbles() {
    bubbles.forEach(b => {
        b.y -= b.speed;
        b.x += Math.sin(time * 0.04 + b.phase) * 0.4;
        if (b.y < -40) b.y = 8700;
        // Only draw if roughly on screen
        const screenY = b.y - hook.y + height / 2;
        if (screenY < -20 || screenY > height + 20) return;
        ctx.strokeStyle = 'rgba(140, 210, 255, 0.38)';
        ctx.lineWidth = 0.8;
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
        ctx.stroke();
        ctx.fillStyle = 'rgba(200, 235, 255, 0.55)';
        ctx.beginPath();
        ctx.arc(b.x - b.r * 0.28, b.y - b.r * 0.28, b.r * 0.32, 0, Math.PI * 2);
        ctx.fill();
    });
}

// ─── DRAW SEAWEED ─────────────────────────────────────────────────────────────

function drawSeaweeds() {
    seaweeds.forEach((sw, i) => {
        ctx.strokeStyle = `rgba(20, ${sw.g}, 55, 0.78)`;
        ctx.lineWidth = sw.lw;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.shadowBlur = 5;
        ctx.shadowColor = `rgba(0, ${sw.g + 20}, 80, 0.5)`;
        ctx.beginPath();
        ctx.moveTo(sw.x, 9400);
        for (let j = 1; j <= sw.segs; j++) {
            const t = j / sw.segs;
            const sway = Math.sin(time * 0.022 + sw.phase + t * 2.8) * 28 * t;
            ctx.lineTo(sw.x + sway, 9400 - sw.h * t);
        }
        ctx.stroke();
    });
    ctx.shadowBlur = 0;
}

// ─── DRAW CORALS / ROCKS ──────────────────────────────────────────────────────

function drawCorals() {
    corals.forEach(c => {
        ctx.fillStyle = c.color;
        ctx.beginPath();
        ctx.ellipse(c.x, c.y, c.r, c.r * 0.55, 0, 0, Math.PI * 2);
        ctx.fill();
        // A couple of bumps on top
        ctx.beginPath();
        ctx.ellipse(c.x - c.r * 0.3, c.y - c.r * 0.3, c.r * 0.4, c.r * 0.35, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(c.x + c.r * 0.25, c.y - c.r * 0.2, c.r * 0.3, c.r * 0.28, 0, 0, Math.PI * 2);
        ctx.fill();
    });
}

// ─── DRAW CATCH FLASH ─────────────────────────────────────────────────────────

function updateFlashes() {
    flashes = flashes.filter(fl => fl.age < 22);
    flashes.forEach(fl => {
        const r = fl.age * 2.8;
        const op = (1 - fl.age / 22).toFixed(2);
        ctx.strokeStyle = fl.color + Math.floor((1 - fl.age / 22) * 255).toString(16).padStart(2, '0');
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(fl.x, fl.y, r, 0, Math.PI * 2);
        ctx.stroke();
        fl.age++;
    });
}

// ─── BACKGROUND ───────────────────────────────────────────────────────────────

function drawBackground() {
    const surfaceScreenY = height / 2 - hook.y;

    // Sky (only when near surface)
    if (surfaceScreenY > 0) {
        const skyGrad = ctx.createLinearGradient(0, 0, 0, surfaceScreenY);
        skyGrad.addColorStop(0, '#000810');
        skyGrad.addColorStop(1, '#001a38');
        ctx.fillStyle = skyGrad;
        ctx.fillRect(0, 0, width, surfaceScreenY);
    }

    // Water
    const wTop = Math.max(0, surfaceScreenY);
    const waterGrad = ctx.createLinearGradient(0, wTop, 0, height);
    waterGrad.addColorStop(0,   '#004488');
    waterGrad.addColorStop(0.08,'#002255');
    waterGrad.addColorStop(0.4, '#001133');
    waterGrad.addColorStop(1,   '#000208');
    ctx.fillStyle = waterGrad;
    ctx.fillRect(0, wTop, width, height - wTop);
}

// ─── INPUT ────────────────────────────────────────────────────────────────────

startBtn.onclick = function () {
    msgEl.style.display = 'none';
    money = 0; moneyEl.innerText = '0';
    hook.y = 50; hook.x = width / 2; targetX = width / 2;
    spawn();
    gameState = 'DOWN';
    requestAnimationFrame(loop);
};

function move(e) {
    const x = e.touches ? e.touches[0].clientX : e.clientX;
    const y = e.touches ? e.touches[0].clientY : e.clientY;
    targetX = x;
    if (gameState === 'FLY') {
        caughtFishes.forEach(f => {
            if (Math.hypot(x - f.x, y - f.y) < 65) {
                f.y = 9999;
                money += 10;
                moneyEl.innerText = money;
                flashes.push({ x: f.x, y: f.y, color: f.color, age: 0 });
            }
        });
    }
}
window.addEventListener('touchstart', move);
window.addEventListener('touchmove', move);
window.addEventListener('mousedown', move);
window.addEventListener('mousemove', move);

// ─── MAIN LOOP ────────────────────────────────────────────────────────────────

function loop() {
    if (gameState === 'START') return;
    time++;

    drawBackground();

    if (gameState === 'DOWN' || gameState === 'UP') {
        hook.x += (targetX - hook.x) * 0.14;

        if (gameState === 'DOWN') {
            hook.y += hook.speed;
            depthEl.innerText = Math.floor(hook.y / 10);
            fishes.forEach(f => {
                if (Math.hypot(hook.x - f.x, hook.y - f.y) < f.size + 4) gameState = 'UP';
            });
            if (hook.y > 8500) gameState = 'UP';
        } else {
            hook.y -= hook.speed * 0.9;
            fishes.forEach(f => {
                if (!f.caught && Math.hypot(hook.x - f.x, hook.y - f.y) < 42) {
                    f.caught = true;
                    caughtFishes.push(f);
                    flashes.push({ x: f.x, y: f.y, color: f.color, age: 0 });
                    money += 5;
                    moneyEl.innerText = money;
                }
            });
            if (hook.y < 50) {
                gameState = 'FLY';
                caughtFishes.forEach(f => {
                    f.x = width / 2; f.y = height - 50;
                    f.vx = (Math.random() - 0.5) * 5;
                    f.vy = -Math.random() * 5 - 3;
                });
            }
        }

        ctx.save();
        ctx.translate(0, -hook.y + height / 2);

        // Atmosphere layers
        drawLightRays();
        drawCorals();
        drawSeaweeds();
        updateBubbles();
        drawSurface();
        drawBoat();
        updateFlashes();

        // Fish
        fishes.forEach(f => {
            if (!f.caught) {
                f.x += f.speed;
                if (f.x > width + 130) f.x = -130;
                if (f.x < -130) f.x = width + 130;
                drawFish(f.x, f.y, f.size, f.color, f.speed < 0);
            }
        });

        // Line from rod tip to hook
        const rodTipX = width / 2 + ROD_TIP_OFFSET_X;
        const rodTipY = -80 + ROD_TIP_Y + 80; // = ROD_TIP_Y
        ctx.strokeStyle = 'rgba(200, 225, 255, 0.7)';
        ctx.lineWidth = 1.2;
        ctx.shadowBlur = 0;
        drawWavyLine(rodTipX, ROD_TIP_Y, hook.x, hook.y);

        drawHook(hook.x, hook.y);

        ctx.restore();
    }

    if (hook.y < 50) {
                gameState = 'FLY';
                caughtFishes.forEach((f, index) => {
                    f.x = width / 2; 
                    f.y = height - 100;
                    // Ryby vyletí víc nahoru (vy -7 až -11) a méně do stran
                    f.vx = (Math.random() - 0.5) * 4; 
                    f.vy = -Math.random() * 4 - 7;
                    // Přidáme malou prodlevu, aby nelétaly všechny v jedné hromadě
                    f.vy -= (index * 0.5); 
                });
            }
        }

        // ... (zbytek vykreslování v loopu)
    }

    if (gameState === 'FLY') {
        let active = 0;
        caughtFishes.forEach(f => {
            // Gravitace je mírnější (0.02 místo 0.04), aby ryby "plachtily"
            f.x += f.vx; f.y += f.vy; f.vy += 0.08; 
            
            // Odraz od stěn, aby neutekly z obrazu
            if (f.x < 20 || f.x > width - 20) f.vx *= -1;

            if (f.y < height + 100) {
                drawFish(f.x, f.y, f.size, f.color, f.vx < 0);
                active++;
            }
        });

        if (active === 0) {
            gameState = 'START';
            msgEl.style.display = 'flex';
            msgEl.innerHTML = `
                <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; width: 90%; text-align: center;">
                    <h1 style="font-size: 28px; line-height: 1.2; margin-bottom: 5px;">GRATULUJI,<br>JOLANO!</h1>
                    <p class="sub" style="margin-bottom: 20px;">JSI VÝBORNÁ RYBÁŘKA</p>
                    
                    <div style="margin-bottom: 25px;">
                        <p style="color:#88ccff; font-size:12px; letter-spacing:2px; margin:0;">SKÓRE</p>
                        <p style="font-size:58px; color:#ffee00; text-shadow:0 0 15px #ffee00; margin:0; font-family:'Courier New',monospace; font-weight:bold;">${money}</p>
                    </div>

                    <p style="color:#fff; font-size:14px; letter-spacing:1px; line-height: 1.5; margin-bottom: 35px; text-shadow: 0 0 5px #00ffcc;">
                        PŘEJEME HODNĚ ŠTĚSTÍ<br>U VODY :-)
                    </p>
                    
                    <button onclick="location.reload()" style="white-space: nowrap;">&#9654; ZNOVU</button>
                </div>
            `;
        }
    }

    requestAnimationFrame(loop);
}
</script>
</body>
</html>
