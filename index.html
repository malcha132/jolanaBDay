<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Fishing Game for Jolana</title>
    <style>
        body { margin: 0; overflow: hidden; background: #001a33; font-family: sans-serif; color: white; touch-action: none; }
        canvas { display: block; background: linear-gradient(#4da6ff, #001a33); }
        #ui { position: absolute; top: 10px; left: 10px; pointer-events: none; }
        #msg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; font-size: 24px; text-shadow: 2px 2px #000; }
    </style>
</head>
<body>

<div id="ui">Peníze: <span id="money">0</span> $ | Hloubka: <span id="depth">0</span>m</div>
<div id="msg">Klikni pro start!<br>(Pohybuj myší/prstem do stran)</div>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const moneyEl = document.getElementById('money');
const depthEl = document.getElementById('depth');
const msgEl = document.getElementById('msg');

let width, height;
let money = 0;
let gameState = 'START'; // START, DOWN, UP, FLY
let hook = { x: 0, y: 50, speed: 4, radius: 10 };
let fishes = [];
let caughtFishes = [];
let score = 0;

function init() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
    hook.x = width / 2;
}

window.addEventListener('resize', init);
init();

// Ovládání
let targetX = width / 2;
window.addEventListener('mousemove', (e) => targetX = e.clientX);
window.addEventListener('touchmove', (e) => targetX = e.touches[0].clientX);
window.addEventListener('mousedown', () => {
    if (gameState === 'START') {
        gameState = 'DOWN';
        msgEl.style.display = 'none';
        spawnFishes();
    }
});

function spawnFishes() {
    fishes = [];
    for (let i = 0; i < 50; i++) {
        fishes.push({
            x: Math.random() * width,
            y: 500 + i * 150,
            color: `hsl(${Math.random() * 360}, 70%, 60%)`,
            size: 15 + Math.random() * 10,
            speed: (Math.random() - 0.5) * 4,
            caught: false
        });
    }
}

function update() {
    if (gameState === 'DOWN' || gameState === 'UP') {
        // Plynulý pohyb k myši
        hook.x += (targetX - hook.x) * 0.1;

        if (gameState === 'DOWN') {
            hook.y += hook.speed;
            depthEl.innerText = Math.floor(hook.y / 10);
            
            // Kolize při cestě dolů (náraz do ryby = konec ponoru)
            fishes.forEach(f => {
                let dist = Math.hypot(hook.x - f.x, hook.y - f.y);
                if (dist < f.size) gameState = 'UP';
            });
            
            if (hook.y > 8000) gameState = 'UP'; // Max hloubka
        } else {
            hook.y -= hook.speed * 1.5;
            // Chytání ryb cestou nahoru
            fishes.forEach(f => {
                if (!f.caught) {
                    let dist = Math.hypot(hook.x - f.x, hook.y - f.y);
                    if (dist < f.size + 10) {
                        f.caught = true;
                        caughtFishes.push(f);
                    }
                }
            });

            if (hook.y < 50) {
                gameState = 'FLY';
                launchFishes();
            }
        }
    }

    if (gameState === 'FLY') {
        let allGone = true;
        caughtFishes.forEach(f => {
            f.x += f.vx;
            f.y += f.vy;
            f.vy += 0.2; // Gravitace

        });
        if (allGone) resetGame();
    }
