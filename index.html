<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jolana Fishing Pro - Deluxe</title>
    <style>
        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000816; touch-action: none; font-family: 'Segoe UI', Arial, sans-serif; }
        canvas { display: block; filter: contrast(110%) brightness(110%); }
        
        #ui {
            position: absolute; top: 20px; width: 100%; text-align: center;
            color: #00ffcc; font-size: 24px; font-weight: bold; z-index: 50;
            pointer-events: none; letter-spacing: 2px;
            text-shadow: 0 0 10px #00ffcc, 0 0 20px rgba(0, 255, 204, 0.5);
        }

        #msg {
            position: absolute; inset: 0; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; 
            background: rgba(0, 8, 22, 0.85); color: white; z-index: 100;
            backdrop-filter: blur(10px); text-align: center; padding: 20px;
        }

        h1 { font-size: 48px; color: #ff00aa; margin: 0; text-shadow: 0 0 20px #ff00aa; letter-spacing: 2px; line-height: 1.2; }
        .sub { color: #00ffcc; letter-spacing: 4px; margin-top: 10px; font-size: 18px; text-transform: uppercase; }
        
        button { 
            margin-top: 30px; padding: 18px 50px; font-size: 22px; background: transparent; 
            color: #ff00aa; border: 3px solid #ff00aa; cursor: pointer; 
            font-weight: bold; transition: 0.3s; box-shadow: 0 0 15px rgba(255, 0, 170, 0.3);
        }
        button:hover { background: #ff00aa; color: white; box-shadow: 0 0 30px #ff00aa; }
    </style>
</head>
<body>

<div id="ui">SKÓRE: <span id="money">0</span> &nbsp;|&nbsp; <span id="depth">0</span>m</div>

<div id="msg">
    <h1>◈ JOLANA ◈</h1>
    <p class="sub">Fishing Pro Deluxe</p>
    <button id="startBtn">SPOUSTIT LOV</button>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const startBtn = document.getElementById('startBtn');
const msgEl = document.getElementById('msg');
const moneyEl = document.getElementById('money');
const depthEl = document.getElementById('depth');

let width, height, money = 0, gameState = 'START';
let hook = { x: 0, y: 50, speed: 9 };
let fishes = [], caughtFishes = [], trail = [];
let targetX = 0;

function resize() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
    hook.x = width / 2;
}
window.addEventListener('resize', resize);
resize();

function spawn() {
    fishes = []; caughtFishes = []; trail = [];
    for (let i = 0; i < 45; i++) {
        fishes.push({
            x: Math.random() * width,
            y: 700 + i * 190,
            hue: Math.random() * 360,
            size: 22 + Math.random() * 12,
            speed: (Math.random() - 0.5) * 8,
            vx: 0, vy: 0,
            caught: false,
            sliced: false,
            sliceGap: 0,
            rot: 0
        });
    }
}

function drawFish(f) {
    ctx.save();
    ctx.translate(f.x, f.y);
    ctx.rotate(f.rot);
    
    let dir = (gameState === 'FLY') ? f.vx : f.speed;
    if (dir < 0) ctx.scale(-1, 1);
    
    const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, f.size);
    grad.addColorStop(0, `hsl(${f.hue}, 90%, 70%)`);
    grad.addColorStop(1, `hsl(${f.hue}, 90%, 40%)`);
    
    ctx.fillStyle = grad;
    ctx.shadowBlur = f.sliced ? 0 : 20;
    ctx.shadowColor = `hsl(${f.hue}, 90%, 50%)`;

    if (f.sliced) {
        // Efektní rozseknutí
        ctx.fillRect(-f.size, -f.sliceGap - 4, f.size * 1.6, f.size * 0.4);
        ctx.fillRect(-f.size, f.sliceGap + 4, f.size * 1.6, f.size * 0.4);
    } else {
        // Tělo ryby
        ctx.beginPath();
        ctx.ellipse(0, 0, f.size, f.size * 0.65, 0, 0, Math.PI * 2);
        ctx.fill();
        // Ocas
        ctx.beginPath();
        ctx.moveTo(-f.size * 0.8, 0);
        ctx.lineTo(-f.size * 1.5, -f.size * 0.6);
        ctx.lineTo(-f.size * 1.5, f.size * 0.6);
        ctx.closePath();
        ctx.fill();
        // Oko
        ctx.fillStyle = "white";
        ctx.beginPath(); ctx.arc(f.size * 0.5, -f.size * 0.15, f.size * 0.15, 0, Math.PI*2); ctx.fill();
    }
    ctx.restore();
}

function move(e) {
    const x = e.touches ? e.touches[0].clientX : e.clientX;
    const y = e.touches ? e.touches[0].clientY : e.clientY;
    targetX = x;

    if (gameState === 'FLY') {
        trail.push({ x, y, age: 0 });
