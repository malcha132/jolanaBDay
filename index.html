<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jolana Fishing Pro</title>
    <style>
        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000820; touch-action: none; font-family: 'Courier New', monospace; }
        canvas { display: block; width: 100vw; height: 100vh; }
        #ui {
            position: absolute; top: 18px; width: 100%; text-align: center;
            color: #00ffcc; font-size: 20px; font-weight: bold; z-index: 50;
            pointer-events: none; letter-spacing: 3px;
            text-shadow: 0 0 8px #00ffcc, 0 0 20px #00ffcc88;
        }
        #msg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: #000820; color: white; z-index: 100;
        }
        h1 {
            font-family: 'Courier New', monospace; font-size: 42px; letter-spacing: 6px;
            color: #ff00aa; margin-bottom: 8px;
            text-shadow: 0 0 10px #ff00aa, 0 0 30px #ff00aa88;
        }
        .sub {
            color: #00ffcc; letter-spacing: 4px; font-size: 14px; margin-bottom: 40px;
            text-shadow: 0 0 8px #00ffcc;
        }
        button {
            padding: 18px 55px; font-size: 22px; font-family: 'Courier New', monospace;
            background: transparent; color: #ff00aa; letter-spacing: 4px;
            border: 2px solid #ff00aa; border-radius: 4px; font-weight: bold; cursor: pointer;
            text-shadow: 0 0 8px #ff00aa;
            box-shadow: 0 0 12px #ff00aa88, inset 0 0 12px #ff00aa22;
            transition: all 0.15s;
        }
        button:hover { background: #ff00aa22; box-shadow: 0 0 24px #ff00aacc, inset 0 0 20px #ff00aa44; }
    </style>
</head>
<body>

<div id="ui">
    SKÓRE: <span id="money">0</span> &nbsp;|&nbsp; HLOUBKA: <span id="depth">0</span>m
</div>

<div id="msg">
    <h1>◈ JOLANA ◈</h1>
    <p class="sub">FISHING PRO</p>
    <p style="color:#555; font-size:13px; letter-spacing:2px; margin-bottom:36px;">CHYTEJ RYBY CESTOU NAHORU</p>
    <button id="startBtn">&#9654; START</button>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const startBtn = document.getElementById('startBtn');
const msgEl = document.getElementById('msg');
const moneyEl = document.getElementById('money');
const depthEl = document.getElementById('depth');

let width, height, money = 0, gameState = 'START';
let hook = { x: 0, y: 50, speed: 6, radius: 12 };
let fishes = [], caughtFishes = [], targetX = 0;
let time = 0;

const fishColors = ['#ff00aa', '#00ffcc', '#ffee00', '#ff6600', '#cc00ff', '#00aaff', '#ff3355'];

function resize() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
    hook.x = width / 2;
    targetX = width / 2;
}
window.addEventListener('resize', resize);
resize();

function spawn() {
    fishes = [];
    caughtFishes = [];
    for (let i = 0; i < 50; i++) {
        fishes.push({
            x: Math.random() * width,
            y: 600 + (i * 170),
            color: fishColors[Math.floor(Math.random() * fishColors.length)],
            size: 16 + Math.random() * 8,
            speed: (Math.random() - 0.5) * 7,
            caught: false
        });
    }
}

function drawFish(x, y, size, color, flip) {
    ctx.shadowBlur = 14;
    ctx.shadowColor = color;
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.ellipse(x, y, size, size / 1.7, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    let tailX = flip ? size : -size;
    ctx.moveTo(x + tailX, y);
    ctx.lineTo(x + tailX * 1.6, y - size / 1.4);
    ctx.lineTo(x + tailX * 1.6, y + size / 1.4);
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#000';
    let eyeX = flip ? x - size * 0.45 : x + size * 0.45;
    ctx.beginPath();
    ctx.arc(eyeX, y - size * 0.12, size * 0.14, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowColor = 'transparent';
}

// Vlnící se lanko - animovaná sinusoida podél přímky od člunu k háčku
function drawWavyLine(x1, y1, x2, y2) {
    const segments = 30;
    const dx = x2 - x1, dy = y2 - y1;
    const len = Math.hypot(dx, dy);
    if (len === 0) return;
    const nx = -dy / len, ny = dx / len; // kolmý vektor

    ctx.beginPath();
    ctx.moveTo(x1, y1);
    for (let i = 1; i <= segments; i++) {
        const t = i / segments;
        const px = x1 + dx * t;
        const py = y1 + dy * t;
        const amp = Math.sin(t * Math.PI) * 10;
        const wave = Math.sin(t * Math.PI * 5 - time * 0.12) * amp;
        ctx.lineTo(px + nx * wave, py + ny * wave);
    }
    ctx.stroke();
}

function drawBackground() {
    const grad = ctx.createLinearGradient(0, 0, 0, height);
    grad.addColorStop(0, '#001133');
    grad.addColorStop(0.4, '#000c28');
    grad.addColorStop(1, '#000310');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, width, height);
}

startBtn.onclick = function () {
    msgEl.style.display = 'none';
    money = 0;
    moneyEl.innerText = '0';
    hook.y = 50;
    hook.x = width / 2;
    targetX = width / 2;
    spawn();
    gameState = 'DOWN';
    requestAnimationFrame(loop);
};

function move(e) {
    let x = e.touches ? e.touches[0].clientX : e.clientX;
    let y = e.touches ? e.touches[0].clientY : e.clientY;
    targetX = x;
    if (gameState === 'FLY') {
        caughtFishes.forEach(f => {
            if (Math.hypot(x - f.x, y - f.y) < 65) {
                f.y = 9000;
                money += 10;
                moneyEl.innerText = money;
            }
        });
    }
}

window.addEventListener('touchstart', move);
window.addEventListener('touchmove', move);
window.addEventListener('mousedown', move);
window.addEventListener('mousemove', move);

function loop() {
    if (gameState === 'START') return;
    time++;

    drawBackground();

    if (gameState === 'DOWN' || gameState === 'UP') {
        hook.x += (targetX - hook.x) * 0.14;

        if (gameState === 'DOWN') {
            hook.y += hook.speed;
            depthEl.innerText = Math.floor(hook.y / 10);
            fishes.forEach(f => {
                if (Math.hypot(hook.x - f.x, hook.y - f.y) < f.size + 4) gameState = 'UP';
            });
            if (hook.y > 8500) gameState = 'UP';
        } else {
            hook.y -= hook.speed * 0.9;
            fishes.forEach(f => {
                if (!f.caught && Math.hypot(hook.x - f.x, hook.y - f.y) < 40) {
                    f.caught = true;
                    caughtFishes.push(f);
                    money += 5;
                    moneyEl.innerText = money;
                }
            });
            if (hook.y < 50) {
                gameState = 'FLY';
                caughtFishes.forEach(f => {
                    f.x = width / 2;
                    f.y = height - 50;
                    f.vx = (Math.random() - 0.5) * 5;
                    f.vy = -Math.random() * 5 - 3;
                });
            }
        }

        ctx.save();
        ctx.translate(0, -hook.y + height / 2);

        // Vlnící se lanko
        ctx.strokeStyle = '#aaddff';
        ctx.lineWidth = 1.5;
        ctx.shadowBlur = 0;
        drawWavyLine(width / 2, 0, hook.x, hook.y);

        // Háček
        ctx.shadowBlur = 12;
        ctx.shadowColor = '#00ffcc';
        ctx.strokeStyle = 'silver';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(hook.x - 8, hook.y, 8, 0, Math.PI);
        ctx.stroke();
        ctx.shadowBlur = 0;

        fishes.forEach(f => {
            if (!f.caught) {
                f.x += f.speed;
                if (f.x > width + 120) f.x = -120;
                if (f.x < -120) f.x = width + 120;
                drawFish(f.x, f.y, f.size, f.color, f.speed < 0);
            }
        });

        ctx.restore();
    }

    if (gameState === 'FLY') {
        let active = 0;
        caughtFishes.forEach(f => {
            f.x += f.vx;
            f.y += f.vy;
            f.vy += 0.04;
            if (f.y < height + 100) {
                drawFish(f.x, f.y, f.size, f.color, f.vx < 0);
                active++;
            }
        });

        if (active === 0) {
            gameState = 'START';
            msgEl.style.display = 'flex';
            msgEl.innerHTML = `
                <h1>KONEC LOVU</h1>
                <p class="sub">CELKOVÉ SKÓRE</p>
                <p style="font-size:52px; color:#ffee00; text-shadow: 0 0 16px #ffee00; margin: 10px 0 40px; font-family:'Courier New',monospace; letter-spacing:4px;">${money}</p>
                <button onclick="location.reload()">&#9654; ZNOVU</button>
            `;
        }
    }

    requestAnimationFrame(loop);
}
</script>
</body>
</html>
