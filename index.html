<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jolana Fishing Pro</title>
    <style>
        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000c1f; touch-action: none; font-family: 'Courier New', monospace; }
        canvas { display: block; width: 100vw; height: 100vh; }
        #ui {
            position: absolute; top: 18px; width: 100%; text-align: center;
            color: #00ffcc; font-size: 20px; font-weight: bold; z-index: 50;
            pointer-events: none; letter-spacing: 3px;
            text-shadow: 0 0 8px #00ffcc, 0 0 20px #00ffcc88;
        }
        #msg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: #000c1f; color: white; z-index: 100;
        }
        h1 { font-family: 'Courier New', monospace; font-size: 42px; letter-spacing: 6px; color: #ff00aa; margin-bottom: 8px; text-shadow: 0 0 10px #ff00aa, 0 0 30px #ff00aa88; }
        .sub { color: #00ffcc; letter-spacing: 4px; font-size: 14px; margin-bottom: 40px; text-shadow: 0 0 8px #00ffcc; }
        button { padding: 18px 55px; font-size: 22px; font-family: 'Courier New', monospace; background: transparent; color: #ff00aa; letter-spacing: 4px; border: 2px solid #ff00aa; border-radius: 4px; font-weight: bold; cursor: pointer; text-shadow: 0 0 8px #ff00aa; box-shadow: 0 0 12px #ff00aa88, inset 0 0 12px #ff00aa22; transition: all 0.15s; }
    </style>
</head>
<body>
<div id="ui">SKÓRE: <span id="money">0</span> &nbsp;|&nbsp; HLOUBKA: <span id="depth">0</span>m</div>
<div id="msg">
    <h1>◈ JOLANA ◈</h1>
    <p class="sub">FISHING PRO</p>
    <p style="color:#666; font-size:13px; letter-spacing:2px; margin-bottom:36px;">POSEKEJ RYBY MAČETOU!</p>
    <button id="startBtn">&#9654; START</button>
</div>
<canvas id="game"></canvas>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const startBtn = document.getElementById('startBtn');
const msgEl = document.getElementById('msg');
const moneyEl = document.getElementById('money');
const depthEl = document.getElementById('depth');

let width, height, money = 0, gameState = 'START';
let hook = { x: 0, y: 50, speed: 8 };
let fishes = [], caughtFishes = [], trail = [], flashes = [];
let targetX = 0, time = 0;

const fishColors = ['#ff00aa', '#00ffcc', '#ffee00', '#ff6600', '#cc00ff', '#00aaff', '#ff3355', '#44ff88'];

function resize() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
    hook.x = width / 2; targetX = width / 2;
}
window.addEventListener('resize', resize);
resize();

function spawn() {
    fishes = []; caughtFishes = []; flashes = [];
    for (let i = 0; i < 40; i++) {
        fishes.push({
            x: Math.random() * width,
            y: 600 + i * 180,
            color: fishColors[i % fishColors.length],
            size: 18 + Math.random() * 10,
            speed: (Math.random() - 0.5) * 7,
            caught: false,
            sliced: false,
            sliceGap: 0
        });
    }
}

function drawFish(f) {
    ctx.save();
    ctx.translate(f.x, f.y);
    if (f.vx < 0 || f.speed < 0) ctx.scale(-1, 1);
    
    ctx.fillStyle = f.color;
    ctx.shadowBlur = f.sliced ? 0 : 15;
    ctx.shadowColor = f.color;

    if (f.sliced) {
        // Horní půlka
        ctx.beginPath();
        ctx.ellipse(0, -f.sliceGap, f.size, f.size * 0.3, 0, Math.PI, 0);
        ctx.fill();
        // Spodní půlka
        ctx.beginPath();
        ctx.ellipse(0, f.sliceGap, f.size, f.size * 0.3, 0, 0, Math.PI);
        ctx.fill();
    } else {
        ctx.beginPath();
        ctx.ellipse(0, 0, f.size, f.size * 0.6, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo(-f.size * 0.8, 0);
        ctx.lineTo(-f.size * 1.4, -f.size * 0.5);
        ctx.lineTo(-f.size * 1.4, f.size * 0.5);
        ctx.fill();
    }
    ctx.restore();
}

function move(e) {
    const x = e.touches ? e.touches[0].clientX : e.clientX;
    const y = e.touches ? e.touches[0].clientY : e.clientY;
    targetX = x;

    if (gameState === 'FLY') {
        trail.push({ x, y, age: 0 });
        caughtFishes.forEach(f => {
            if (!f.sliced && Math.hypot(x - f.x, y - f.y) < 60) {
                f.sliced = true;
                f.vy = 2; // Okamžitý pád dolů
                money += 20;
                moneyEl.innerText = money;
            }
        });
    }
}

window.addEventListener('mousemove', move);
window.addEventListener('touchmove', move);
window.addEventListener('mousedown', move);

startBtn.onclick = () => {
    msgEl.style.display = 'none';
    money = 0; moneyEl.innerText = '0';
    hook.y = 50; gameState = 'DOWN';
    spawn();
    requestAnimationFrame(loop);
};

function loop() {
    if (gameState === 'START') return;
    time++;

    ctx.fillStyle = '#000c1f';
    ctx.fillRect(0, 0, width, height);

    if (gameState === 'DOWN' || gameState === 'UP') {
        hook.x += (targetX - hook.x) * 0.15;
        if (gameState === 'DOWN') {
            hook.y += 8;
            depthEl.innerText = Math.floor(hook.y / 10);
            fishes.forEach(f => { if (Math.hypot(hook.x-f.x, hook.y-f.y) < 30) gameState = 'UP'; });
            if (hook.y > 7000) gameState = 'UP';
        } else {
            hook.y -= 9;
            fishes.forEach(f => {
                if (!f.caught && Math.hypot(hook.x-f.x, hook.y-f.y) < 40) {
                    f.caught = true; caughtFishes.push(f);
                    money += 5; moneyEl.innerText = money;
                }
            });
            if (hook.y < 50) {
                gameState = 'FLY';
                caughtFishes.forEach(f => {
                    f.x = width / 2 + (Math.random()-0.5)*100;
                    f.y = height + 20;
                    f.vx = (Math.random()-0.5) * 12;
                    f.vy = -Math.random() * 15 - 12
