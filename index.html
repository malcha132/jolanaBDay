<!DOCTYPE html>
<html lang="cs">
<head>

    <title>Jolana Rybareni</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #001a33; touch-action: none; font-family: sans-serif; }

        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #001a33; color: white; z-index: 100; }
        button { padding: 25px 60px; font-size: 30px; background: #2ecc71; border: none; border-radius: 60px; color: white; font-weight: bold; box-shadow: 0 10px 0 #27ae60; }
        button:active { transform: translateY(5px); box-shadow: 0 5px 0 #27ae60; }
        #ui { position: absolute; top: 10px; width: 100%; text-align: center; color: white; font-size: 24px; z-index: 50; pointer-events: none; }
    </style>
</head>
<body>

<div id="ui">$ <span id="money">0</span> | <span id="depth">0</span> m</div>

<div id="overlay">
    <h1 style="font-size: 40px; margin-bottom: 10px;">JOLANA</h1>
    <p style="margin-bottom: 40px; font-size: 18px; color: #4da6ff;">RYBÁŘSKÁ HRA</p>
    <button id="startBtn">HRÁT</button>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const startBtn = document.getElementById('startBtn');
const overlay = document.getElementById('overlay');
const moneyText = document.getElementById('money');
const depthText = document.getElementById('depth');

let width, height, money = 0, gameState = 'START';
let hook = { x: 0, y: 50, speed: 3.5, radius: 15 };
let fishes = [], caughtFishes = [], targetX = 0;
let isLooping = false;

function resize() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
    hook.x = width / 2;
    targetX = width / 2;
}
window.addEventListener('resize', resize);
resize();

// Kreslení ryby
function drawFish(x, y, size, color, isFlipped) {
    ctx.fillStyle = color;
    // Tělo
    ctx.beginPath();
    ctx.ellipse(x, y, size, size/1.8, 0, 0, Math.PI*2);
    ctx.fill();
    // Ocas
    ctx.beginPath();
    let t = isFlipped ? size : -size;
    ctx.moveTo(x + t, y);
    ctx.lineTo(x + t*1.5, y - size/1.5);
    ctx.lineTo(x + t*1.5, y + size/1.5);
    ctx.fill();
    // Oko
    ctx.fillStyle = "white";
    ctx.beginPath();
    ctx.arc(x - t/1.5, y - 2, size/5, 0, Math.PI*2);
    ctx.fill();
}

// Kreslení háčku
function drawHook(x, y) {
    ctx.strokeStyle = "#silver";
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.moveTo(x, y - 20);
    ctx.lineTo(x, y + 15);
    ctx.arc(x - 12, y + 15, 12, 0, Math.PI);
    ctx.lineTo(x - 24, y + 5);
    ctx.stroke();
}

// START HRY (Všechno se musí stát tady)

    overlay.style.display = 'none';
    gameState = 'DOWN';
