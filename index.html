<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Deep Sea Angler - Opraveno</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style>
        body { margin: 0; background: #0a1520; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        canvas { border: 4px solid #fff; }
    </style>
</head>
<body>

<script>
const config = {
    type: Phaser.AUTO,
    width: 600,
    height: 700,
    physics: {
        default: 'arcade',
        arcade: { debug: false }
    },
    scene: { preload: preload, create: create, update: update }
};

new Phaser.Game(config);

let boat, hook, fishGroup, lineGraphics, scoreText;
let caughtFish = null;
let score = 0;

function preload() {
    // Vytvoříme jednoduchý bílý čtverec, který pak obarvíme, aby se nestalo, že se nic nenačte
    let rect = this.make.graphics().fillStyle(0xffffff).fillRect(0, 0, 32, 32);
    rect.generateTexture('pixel', 32, 32);
}

function create() {
    // Pozadí
    this.add.graphics().fillGradientStyle(0x4488ff, 0x4488ff, 0x001133, 0x001133, 1).fillRect(0, 0, 600, 700);
    
    lineGraphics = this.add.graphics();

    // Ryby
    fishGroup = this.physics.add.group();
    for (let i = 0; i < 15; i++) {
        spawnFish(this);
    }

    // Loď - hnědý obdélník
    boat = this.add.rectangle(300, 80, 100, 30, 0x8B4513);
    this.physics.add.existing(boat);

    // Háček - malý bílý čtvereček
    hook = this.add.rectangle(300, 150, 15, 15, 0xbdc3c7);
    this.physics.add.existing(hook);

    scoreText = this.add.text(20, 20, 'VÝDĚLEK: 0$', { fontSize: '24px', fill: '#fff' });

    // Kolize háčku a ryb
    this.physics.add.overlap(hook, fishGroup, (h, f) => {
        if (!caughtFish) {
            caughtFish = f;
            f.body.setVelocity(0, 0);
        }
    });
}

function update() {
    let pointer = this.input.activePointer;

    // Pohyb lodi
    boat.x = Phaser.Math.Linear(boat.x, pointer.x || 300, 0.1);

    // Háček následuje loď a klesá podle myši
    hook.x = boat.x;
    let targetY = Phaser.Math.Clamp(pointer.y, 110, 680);
    hook.y = Phaser.Math.Linear(hook.y, targetY, 0.1);

    // Vlasec
    lineGraphics.clear();
    lineGraphics.lineStyle(2
