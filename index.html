<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Fisher Jolana</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; touch-action: none; font-family: sans-serif; }
        canvas { display: block; width: 100vw; height: 100vh; }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #000; color: white; z-index: 100; }
        button { padding: 25px 60px; font-size: 30px; background: #00ff00; border: none; border-radius: 10px; color: black; font-weight: bold; cursor: pointer; }
        #ui { position: absolute; top: 15px; width: 100%; text-align: center; color: #00ffff; font-size: 24px; font-weight: bold; z-index: 50; pointer-events: none; }
    </style>
</head>
<body>

<div id="ui">SKÓRE: <span id="score">0</span> | ČAS: <span id="time">60</span></div>

<div id="overlay">
    <h1 style="color: #00ffff; margin-bottom: 10px;">Rybičky, rybičky, rybáři jedou!</h1>
    <p style="color: #00ff00; margin-bottom: 40px;">PRO JOLANU</p>
    <button id="startBtn">HRÁT</button>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const startBtn = document.getElementById('startBtn');
const overlay = document.getElementById('overlay');
const scoreEl = document.getElementById('score');
const timeEl = document.getElementById('time');

let width, height, score = 0, timeLeft = 60, gameState = 'START';
let playerX = 0, targetX = 0;
let fishes = [], obstacles = [];
let gameRunning = false;

function init() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
    playerX = width / 2;
    targetX = width / 2;
}
window.addEventListener('resize', init);
init();

// START HRY
startBtn.addEventListener('click', function() {
    overlay.style.display = 'none';
    score = 0;
    timeLeft = 60;
    fishes = [];
    obstacles = [];
    gameState = 'PLAY';
    
    if (!gameRunning) {
        gameRunning = true;
        timer();
        loop(); // Spustíme smyčku až po kliknutí
    }
});

function timer() {
    if (gameState === 'PLAY') {
        timeLeft--;
        timeEl.innerText = timeLeft;
        if (timeLeft <= 0) {
            gameState = 'END';
            overlay.style.display = 'flex';
            document.querySelector('h1').innerText = "KONEC!";
            document.querySelector('p').innerText = "SKÓRE: " + score;
            startBtn.innerText = "ZNOVU";
        } else {
            setTimeout(timer, 1000);
        }
    }
}

// Ovládání
function move(e) {
    let x = e.touches ? e.touches[0].clientX : e.clientX;
    targetX = x;
}
window.addEventListener('touchmove', move);
window.addEventListener('mousemove', move);
window.addEventListener('touchstart', move);

function loop() {
    if (gameState === 'PLAY') {
        // Pozadí
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, width, height);

        // Pohyb hráče
        playerX += (targetX - playerX) * 0.2;

        // Paprsek
        ctx.fillStyle = 'rgba(0, 255, 255, 0.2)';
        ctx.fillRect(playerX - 30, 100, 60, height);
        ctx.strokeStyle = '#00ffff';
        ctx.lineWidth = 2;
        ctx.strokeRect(playerX - 30, 100, 60, height);

        // Loďka
        ctx.fillStyle = '#00ff00';
        ctx.fillRect(playerX - 40, 70, 80, 30);

        // Spawnování
        if (Math.random() < 0.05) {
            fishes.push({ x: Math.random() * width, y: height + 20, speed: Math.random() * 3 + 2, color: '#
