<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fishing Game for Jolana</title>
    <style>
        body { margin: 0; overflow: hidden; background: #001a33; font-family: sans-serif; color: white; touch-action: none; }
        canvas { display: block; background: linear-gradient(#0055ff, #001a33); width: 100vw; height: 100vh; }
        #ui { position: absolute; top: 10px; width: 100%; text-align: center; pointer-events: none; font-size: 20px; font-weight: bold; }
        #msg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; font-size: 24px; background: rgba(0,0,0,0.6); padding: 20px; border-radius: 10px; width: 80%; border: 2px solid white; }
        button { padding: 15px 30px; font-size: 20px; background: #28a745; color: white; border: none; border-radius: 5px; font-weight: bold; margin-top: 15px; }
    </style>
</head>
<body>

<div id="ui">SCORE: <span id="money">0</span> | <span id="depth">0</span>m</div>
<div id="msg">
    RYBÁŘKA JOLANA<br>
    <small>Uhýbej rybám, cestou zpět je chytej!</small><br>
    <button id="startBtn">START</button>
</div>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const moneyEl = document.getElementById('money');
const depthEl = document.getElementById('depth');
const msgEl = document.getElementById('msg');
const startBtn = document.getElementById('startBtn');

let width, height, money = 0, gameState = 'START';
let hook = { x: 0, y: 50, speed: 4, radius: 10 };
let fishes = [], caughtFishes = [], targetX = 0;
const colors = ['#ff0000', '#ffff00', '#00ff00', '#00ffff', '#ffffff'];

function init() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
    hook.x = width / 2;
    targetX = width / 2;
}
window.addEventListener('resize', init);
init();

startBtn.onclick = function() {
    gameState = 'DOWN';
    msgEl.style.display = 'none';
    money = 0;
    moneyEl.innerText = "0";
    hook.y = 50;
    caughtFishes = [];
    fishes = [];
    for (let i = 0; i < 50; i++) {
        fishes.push({
            x: Math.random() * width,
            y: 500 + i * 150,
            color: colors[Math.floor(Math.random() * colors.length)],
            size: 15,
            speed: (Math.random() - 0.5) * 4,
            caught: false
        });
    }
};

function handleInput(e) {
    const x = e.touches ? e.touches[0].clientX : e.clientX;
    const y = e.touches ? e.touches[0].clientY : e.clientY;
    targetX = x;
    if (gameState === 'FLY') {
        caughtFishes.forEach(f => {
            if (Math.hypot(x - f.x, y - f.y) < 50) {
                f.y = 9000;
                money += 10;
                moneyEl.innerText = money;
            }
        });
    }
}
window.addEventListener('mousemove', handleInput);
window.addEventListener('touchstart', handleInput);
window.addEventListener('touchmove', handleInput);

function loop() {
    ctx.clearRect(0, 0, width, height);

    if (gameState === 'DOWN' || gameState === 'UP') {
        hook.x += (targetX - hook.x) * 0.1;

        if (gameState === 'DOWN') {
            hook.y += hook.speed;
            depthEl.innerText = Math.floor(hook.y / 10);
            fishes.forEach(f => {
                if (Math.hypot(hook.x - f.x, hook.y - f.y) < f.size) gameState = 'UP';
            });
            if (hook.y > 8000) gameState = 'UP';
        } else {
            hook.y -= hook.speed * 2;
            fishes.forEach(f => {
                if (!f.caught && Math.hypot(hook.x - f.x, hook.y - f.y) < 30) {
                    f.caught = true;
                    caughtFishes.push(f);
                }
            });
            if (hook.y < 50) {
                gameState = 'FLY';
                caughtFishes.forEach(f => {
                    f.x = width / 2; f.y = height - 50;
                    f.vx = (Math.random() - 0.5) * 12;
                    f.vy = -Math.random() * 8 - 4;
                });
            }
        }

        ctx.save();
        ctx.translate(0, -hook.y + height / 2);
        ctx.strokeStyle = "white";
        ctx.beginPath();
        ctx.moveTo(width / 2, 0);
        ctx.lineTo(hook.x, hook.y);
        ctx.stroke();
        ctx.fillStyle = "silver";
        ctx.beginPath();
        ctx.arc(hook.x, hook.y, hook.radius, 0, Math.PI * 2);
        ctx.fill();

        fishes.forEach(f => {
            if (!f.caught) {
                f.x += f.speed;
                if (f.x > width + 50) f.x = -50;
                if (f.x < -50) f.x = width + 50;
                ctx.fillStyle = f.color;
                ctx.fillRect(f.x - f.size/2, f.y - f.size/4, f.size, f.size/2);
            }
        });
        ctx.restore();
    }

    if (gameState === 'FLY') {
        let active = 0;
        caughtFishes.forEach(f => {
            f.x += f.vx; f.y += f.vy; f.vy += 0.05;
            if (f.y < height + 100) {
                ctx.fillStyle = f.color;
                ctx.fillRect(f.x - f.size/2, f.y - f.size/2, f.size, f.size);
                active++;
            }
        });
        if (active === 0 && caughtFishes.length > 0) {
            gameState = 'START';
            msgEl.style.display = 'block';
            msgEl.innerHTML = "KONEC LOVU!<br>SCORE: " + money + "<br><button onclick='location.reload()'>ZNOVU</button>";
        }
    }
    requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
