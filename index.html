        canvas { display: block; width: 100vw; height: 100vh; background: linear-gradient(#4da6ff, #001a33); }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(0,20,40,0.9); color: white; font-family: sans-serif; z-index: 100; }

<body>

<div id="ui">$ <span id="money">0</span> | <span id="depth">0</span> m</div>
<div id="overlay">
    <h1>RYBÁŘKA JOLANA</h1>
    <button id="startBtn">START</button>
</div>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const startBtn = document.getElementById('startBtn');
const overlay = document.getElementById('overlay');

let width, height, money = 0, gameState = 'START';
let hook = { x: 0, y: 50, speed: 3, radius: 15 };
let fishes = [], caughtFishes = [], targetX = 0;

function resize() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
    hook.x = width / 2;
    targetX = width / 2;
}
window.addEventListener('resize', resize);
resize();

// JEDNODUCHÉ KRESLENÍ RYBY
function drawFish(x, y, size, color, flip) {
    ctx.fillStyle = color;
    // Tělo
    ctx.beginPath();
    ctx.ellipse(x, y, size, size/1.8, 0, 0, Math.PI*2);
    ctx.fill();
    // Ocas
    ctx.beginPath();
    let tailDir = flip ? size : -size;
    ctx.moveTo(x + tailDir, y);
    ctx.lineTo(x + tailDir*1.5, y - size/2);
    ctx.lineTo(x + tailDir*1.5, y + size/2);
    ctx.fill();
    // Oko
    ctx.fillStyle = "white";
    ctx.beginPath();
    ctx.arc(x - tailDir/2, y - 2, 3, 0, Math.PI*2);
    ctx.fill();
}
