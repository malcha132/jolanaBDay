<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fishing Game for Jolana (Grafická Edice)</title>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background: #001a33; 
            touch-action: none; user-select: none; -webkit-user-select: none;
        }
        canvas { display: block; width: 100vw; height: 100vh; background: linear-gradient(#4da6ff, #001a33); }
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; background: rgba(0, 26, 51, 0.9);
            color: white; font-family: sans-serif; z-index: 100;
        }
        button {
            padding: 25px 50px; font-size: 28px; font-weight: bold;
            background: #2ecc71; border: none; border-radius: 50px;
            color: white; box-shadow: 0 8px 20px rgba(0,0,0,0.5);
            cursor: pointer;
        }
        #ui {
            position: absolute; top: 15px; width: 100%;
            text-align: center; color: white; font-family: sans-serif;
            font-size: 22px; pointer-events: none; z-index: 50; text-shadow: 1px 1px 3px black;
        }
    </style>
</head>
<body>
