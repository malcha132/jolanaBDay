<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fishing Game for Jolana</title>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background: #001a33; 
            touch-action: none; user-select: none; -webkit-user-select: none;
        }
        canvas { display: block; width: 100vw; height: 100vh; background: linear-gradient(#4da6ff, #001a33); }
        
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; background: rgba(0, 26, 51, 0.9);
            color: white; font-family: sans-serif; z-index: 100;
        }
        
        button {
            padding: 25px 50px; font-size: 28px; font-weight: bold;
            background: #2ecc71; border: none; border-radius: 50px;
            color: white; box-shadow: 0 8px 20px rgba(0,0,0,0.5);
            cursor: pointer; animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        #ui {
            position: absolute; top: 15px; width: 100%;
            text-align: center; color: white; font-family: sans-serif;
            font-size: 22px; pointer-events: none; z-index: 50; text-shadow: 1px 1px 3px black;
        }
    </style>
</head>
<body>

<div id="ui">$ <span id="money">0</span> | <span id="depth">0</span> m</div>

<div id="overlay">
    <h1 style="margin-bottom: 5px; letter-spacing: 2px;">FISHING GAME</h1>
    <h2 style="margin-bottom: 30px; color: #4da6ff;">PRO JOLANU</h2>
    <button id="startBtn">START</button>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const startBtn = document.getElementById('startBtn');
const overlay = document.getElementById('overlay');
const moneyEl = document.getElementById('money');
const depthEl = document.getElementById('depth');

let width, height, money = 0, gameState = 'START';
let hook = { x: 0, y: 50, speed: 7, radius: 15 };
let fishes = [], caughtFishes = [], targetX = 0;
let animationStarted = false;

function resize() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
    hook.x = width / 2;
    targetX = width / 2;
}

window.addEventListener('resize', resize);
resize();

// Spuštění hry po kliknutí
startBtn.addEventListener('click', (e) => {
    e.preventDefault();
    e.stopPropagation();
    
    overlay.style.display = 'none';
    gameState = 'DOWN';
    money = 0;
    moneyEl.innerText = money;
    hook.y = 50;
    spawnFishes();

    if (!animationStarted) {
        animationStarted = true;
        draw(); // Spustíme smyčku až teď
    }
});

function spawnFishes() {
    fishes = [];
    caughtFishes = [];
    for (let i = 0; i < 60; i++) {
        fishes.push({
            x: Math.random() * width,
            y: 600 + i * 180,
            color: `hsl(${Math.random() * 360}, 80%, 60%)`,
            size: 25 + Math.random() * 15,
            speed: (Math.random() - 0.5) * 5,
            caught: false
        });
    }
}

function move(e) {
    let clientX = e.touches ? e.touches[0].clientX : e.clientX;
    let clientY = e.touches ? e.touches[0].clientY : e.clientY;
    targetX = clientX;
    
    if (gameState === 'FLY' && (e.type === 'touchstart' || e.type === 'mousedown')) {
        checkHit(clientX, clientY);
    }
}

window.addEventListener('mousedown', move);
window.addEventListener('mousemove', move);
window.addEventListener('touchstart', move, {passive: false});
window.addEventListener('touchmove', move, {passive: false});

function checkHit(tx, ty) {
    caughtFishes.forEach(f => {
        let dist = Math.hypot(tx - f.x, ty - f.y);
        if (dist < 60 && f.y < height) {
            f.y = height + 2000;
            money += 10;
            moneyEl.innerText = money;
        }
    });
}

function update() {
    if (gameState === 'DOWN' || gameState === 'UP') {
        hook.x += (targetX - hook.x) * 0.15;

        if (gameState === 'DOWN') {
            hook.y += hook.speed;
            depthEl.innerText = Math.floor(hook.y / 10);
            fishes.forEach(f => {
                if (Math.hypot(hook.x - f.x, hook.y - f.y) < f.size) gameState = 'UP';
            });
            if (hook.y > 10000) gameState = 'UP';
        } else {
            hook.y -= hook.speed * 2.5;
            fishes.forEach(f => {
                if (!f.caught && Math.hypot(hook.x - f.x, hook.y - f.y) < f.size + 15) {
                    f.caught = true;
                    caughtFishes.push(f);
                }
            });
            if (hook.y < 50) {
                gameState = 'FLY';
                launchFishes();
            }
        }
    }

    if (gameState === 'FLY') {
        let active = 0;
        caughtFishes.forEach(f => {
            f.x += f.vx; f.y += f.vy; f.vy += 0.25;
            if (f.y < height + 100) active++;
        });
        if (active === 0) {
            gameState = 'START';
            overlay.style.display = 'flex';
            startBtn.innerText = "ZNOVU";
        }
    }

    fishes.forEach(f => {
        if (!f.caught) {
            f.x += f.speed;
            if (f.x > width + 50) f.x = -50;
            if (f.x < -50) f.x = width + 50;
        }
    });
}

function launchFishes() {
    caughtFishes.forEach(f => {
        f.x = width / 2; f.y = height - 50;
        f.vx = (Math.random() - 0.5) * 20;
        f.vy = -Math.random() * 25 - 10;
    });
}

function draw() {
    ctx.clearRect(0, 0, width, height);

    if (gameState === 'DOWN' || gameState === 'UP') {
        ctx.save();
        ctx.translate(0, -hook.y + height / 2);
        
        ctx.strokeStyle = "rgba(255,255,255,0.7)";
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(width / 2, -500);
        ctx.lineTo(hook.x, hook.y);
        ctx.stroke();

        ctx.fillStyle = "#ff0000"; // Červený háček pro viditelnost
        ctx.beginPath();
        ctx.arc(hook.x, hook.y, hook.radius, 0, Math.PI * 2);
        ctx.fill();

        fishes.forEach(f => {
            if (!f.caught) {
                ctx.fillStyle = f.color;
                ctx.beginPath();
                ctx.ellipse(f.x, f.y, f.size, f.size/1.5, 0, 0, Math.PI*2);
                ctx.fill();
            }
        });
        ctx.restore();
    }

    if (gameState === 'FLY') {
        caughtFishes.forEach(f => {
            ctx.fillStyle = f.color;
            ctx.beginPath();
            ctx.arc(f.x, f.y, f.size, 0, Math.PI * 2);
            ctx.fill();
        });
    }

    update();
    requestAnimationFrame(draw);
}
</script>
</body>
</html>
