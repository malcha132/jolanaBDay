<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jolana Arcade Fishing</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; touch-action: none; font-family: 'Courier New', Courier, monospace; }
        canvas { display: block; width: 100vw; height: 100vh; background: #0055ff; }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #000; color: #0f0; z-index: 100; border: 4px solid #0f0; box-sizing: border-box; }
        button { padding: 15px 40px; font-size: 25px; background: #f0f; border: 4px solid #fff; color: white; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        #ui { position: absolute; top: 10px; width: 100%; text-align: center; color: #fff; font-size: 22px; z-index: 50; pointer-events: none; text-shadow: 2px 2px #000; }
    </style>
</head>
<body>

<div id="ui">SCORE: <span id="money">0</span> | DEPTH: <span id="depth">0</span>M</div>

<div id="overlay">
    <h1 style="font-size: 40px;">JOLANA FISH</h1>
    <p style="margin-bottom: 30px; color: #ff0;">ARKÁDOVÝ LOV</p>
    <button id="startBtn">START GAME</button>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const startBtn = document.getElementById('startBtn');
const overlay = document.getElementById('overlay');
const moneyText = document.getElementById('money');
const depthText = document.getElementById('depth');

let width, height, money = 0, gameState = 'START';
let hook = { x: 0, y: 50, speed: 5, radius: 10 }; // Rychlejší klesání
let fishes = [], caughtFishes = [], targetX = 0;
const arcadeColors = ['#ff0000', '#ffff00', '#00ff00', '#00ffff', '#ff00ff', '#ffffff'];

function resize() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
    hook.x = width / 2;
    targetX = width / 2;
}
window.addEventListener('resize', resize);
resize();

// Arkádová ryba (zmenšená)
